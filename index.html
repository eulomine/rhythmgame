<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>이리신광교회 아동국 - 양 구조 게임</title>
  <style>
    :root{
      --grass-light:#7ecb6a;
      --grass:#5ab049;
      --grass-dark:#3d8a35;
      --sky-top:#87ceeb;
      --sky-bottom:#c8e6c9;
      --gold:#ffd700;
    }
    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      margin:0;
      padding:0;
    }
    body{
      overflow:hidden;
      user-select:none;
      touch-action:manipulation;
      font-family:'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;
      height:100vh;
      height:100dvh;
      background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 45%,var(--grass-light) 45%,var(--grass) 55%,var(--grass-dark) 100%);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .cloud{
      position:fixed;
      background:white;
      border-radius:50px;
      opacity:.8;
      animation:drift linear infinite;
      pointer-events:none;
      z-index:0;
    }
    .cloud::before,.cloud::after{
      content:'';
      position:absolute;
      background:white;
      border-radius:50%;
    }
    .cloud-1{width:90px;height:30px;top:5%;left:-100px;animation-duration:25s;}
    .cloud-1::before{width:40px;height:40px;top:-20px;left:15px;}
    .cloud-1::after{width:55px;height:45px;top:-25px;left:35px;}
    .cloud-2{width:120px;height:35px;top:12%;left:-150px;animation-duration:35s;animation-delay:8s;opacity:.6;}
    .cloud-2::before{width:50px;height:50px;top:-25px;left:20px;}
    .cloud-2::after{width:65px;height:50px;top:-30px;left:50px;}
    .cloud-3{width:70px;height:25px;top:8%;left:-80px;animation-duration:30s;animation-delay:15s;opacity:.5;}
    .cloud-3::before{width:35px;height:35px;top:-18px;left:10px;}
    .cloud-3::after{width:45px;height:38px;top:-22px;left:28px;}

    @keyframes drift{
      from{transform:translateX(0)}
      to{transform:translateX(calc(100vw + 200px))}
    }

    .grass-decoration{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      height:60px;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }
    .grass-blade{
      position:absolute;
      bottom:0;
      width:8px;
      background:#4a9e3f;
      border-radius:50% 50% 0 0;
      transform-origin:bottom center;
      animation:sway 2s ease-in-out infinite alternate;
    }
    @keyframes sway{
      0%{transform:rotate(-5deg)}
      100%{transform:rotate(5deg)}
    }

    #game-container{
      width:95%;
      max-width:430px;
      text-align:center;
      background:linear-gradient(180deg,rgba(93,64,55,.85) 0%,rgba(62,39,35,.95) 100%);
      padding:18px 15px 22px;
      border-radius:30px;
      box-shadow:0 15px 50px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);
      position:relative;
      z-index:1;
      border:3px solid rgba(255,255,255,.08);
      transition:border-color .3s;
    }

    .game-title{margin-bottom:12px;}
    .church-name{
      font-size:.75rem;
      color:rgba(255,255,255,.6);
      letter-spacing:3px;
      text-transform:uppercase;
      font-weight:600;
      margin-bottom:4px;
    }
    .main-title{
      font-size:1.5rem;
      font-weight:900;
      background:linear-gradient(135deg,#fff,#ffd54f);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    .stats{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(0,0,0,.3);
      border-radius:20px;
      padding:10px 20px;
      margin-bottom:12px;
      font-size:1.3rem;
      font-weight:800;
      color:white;
      backdrop-filter:blur(5px);
    }
    .stat-item{
      display:flex;
      align-items:center;
      gap:6px;
    }
    .stat-icon{font-size:1.1rem;}
    .stat-value{min-width:30px;}
    .time-urgent .stat-value{
      color:#ff5252!important;
      animation:pulse .5s infinite;
    }
    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.2)}
    }

    .progress-bar{
      width:100%;
      height:5px;
      background:rgba(255,255,255,.15);
      border-radius:3px;
      margin-bottom:12px;
      overflow:hidden;
    }
    .progress-fill{
      height:100%;
      background:linear-gradient(90deg,#ffd54f,#ff9800);
      border-radius:3px;
      transition:width 1s linear;
      width:100%;
    }
    .progress-fill.caution{background:linear-gradient(90deg,#ff9800,#f44336);}
    .progress-fill.danger{background:linear-gradient(90deg,#ff5252,#d50000);}

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      touch-action:none;
    }
    .hole{
      height:105px;
      position:relative;
      overflow:hidden;
      border-radius:50%;
      background:radial-gradient(ellipse at center,#0d0705 0%,#1a0f0a 50%,#2c1a10 100%);
      box-shadow:inset 0 8px 25px rgba(0,0,0,.9),0 4px 8px rgba(0,0,0,.3);
      border:4px solid #3e2723;
      touch-action:none;
    }
    .hole::after{
      content:'';
      position:absolute;
      top:3px;
      left:10%;
      width:80%;
      height:15px;
      background:radial-gradient(ellipse,rgba(255,255,255,.06),transparent);
      border-radius:50%;
    }

    .target{
      width:100%;
      height:100%;
      position:absolute;
      left:0;
      bottom:-100%;
      transition:bottom .25s cubic-bezier(.18,.89,.32,1.28);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:55px;
      touch-action:none;
    }
    .target.up{bottom:10px;}

    .char-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      width:70px;
      height:70px;
      border-radius:50%;
      position:relative;
      pointer-events:none;
    }
    .char-sheep{filter:grayscale(40%) brightness(.95);}
    .char-wolf{filter:grayscale(45%) brightness(.88);}

    .score-popup{
      position:absolute;
      font-size:1.4rem;
      font-weight:900;
      pointer-events:none;
      animation:floatUp .8s ease-out forwards;
      z-index:200;
      text-shadow:0 2px 4px rgba(0,0,0,.5);
    }
    .score-popup.plus{color:#ffd54f;}
    .score-popup.minus{color:#ff5252;}

    @keyframes floatUp{
      0%{opacity:1;transform:translateY(0) scale(1)}
      100%{opacity:0;transform:translateY(-50px) scale(1.4)}
    }

    .rescue-sparkle{
      position:absolute;
      pointer-events:none;
      z-index:190;
    }
    .sparkle-dot{
      position:absolute;
      width:6px;
      height:6px;
      border-radius:50%;
      background:#ffd54f;
      animation:sparkle .5s ease-out forwards;
    }
    @keyframes sparkle{
      0%{opacity:1;transform:translate(0,0) scale(1)}
      100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0)}
    }

    .flash-red{animation:flash .3s ease-out;}
    @keyframes flash{
      0%{box-shadow:inset 0 0 80px rgba(255,0,0,.5)}
      100%{box-shadow:none}
    }
    .flash-green{animation:flashG .3s ease-out;}
    @keyframes flashG{
      0%{box-shadow:inset 0 0 40px rgba(100,255,100,.2)}
      100%{box-shadow:none}
    }

    .phase-hard{border-color:rgba(255,152,0,.5);}
    .phase-frenzy{
      border-color:rgba(255,82,82,.6);
      animation:frenzyBorder .6s ease-in-out infinite alternate;
    }
    @keyframes frenzyBorder{
      0%{border-color:rgba(255,82,82,.4)}
      100%{border-color:rgba(255,82,82,.8)}
    }

    .overlay-base{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      border-radius:30px;
      z-index:100;
      backdrop-filter:blur(8px);
    }

    #overlay{background:rgba(15,10,8,.92);}

    .game-info{
      color:rgba(255,255,255,.85);
      margin-bottom:20px;
      font-size:1rem;
      line-height:2;
    }
    .info-badge{
      display:inline-block;
      padding:2px 10px;
      border-radius:8px;
      font-weight:700;
      font-size:.9rem;
    }
    .badge-sheep{background:rgba(255,255,255,.15);color:#e0e0e0;}
    .badge-wolf{background:rgba(255,255,255,.1);color:#bdbdbd;}
    .info-note{
      font-size:.8rem;
      color:rgba(255,255,255,.4);
      margin-top:5px;
    }

    .btn-start{
      padding:16px 50px;
      font-size:1.5rem;
      font-weight:800;
      background:linear-gradient(135deg,#ffd54f,#ffb300);
      color:#3e2723;
      border:none;
      border-radius:50px;
      cursor:pointer;
      box-shadow:0 6px 20px rgba(255,179,0,.4);
      transition:all .2s;
      letter-spacing:1px;
    }
    .btn-start:hover{transform:translateY(-2px);}
    .btn-start:active{transform:scale(.96);}

    .btn-secondary{
      padding:12px 28px;
      font-size:1rem;
      font-weight:700;
      background:rgba(255,255,255,.08);
      color:rgba(255,255,255,.7);
      border:1.5px solid rgba(255,255,255,.2);
      border-radius:50px;
      cursor:pointer;
      transition:all .2s;
      margin-top:10px;
    }
    .btn-secondary:hover{
      background:rgba(255,255,255,.15);
      color:white;
    }
    .btn-secondary:active{transform:scale(.96);}

    #countdown{
      font-size:7rem;
      font-weight:900;
      color:var(--gold);
      text-shadow:0 4px 20px rgba(255,215,0,.5);
      display:none;
    }

    #result-overlay{
      background:rgba(15,10,8,.95);
      display:none;
      z-index:150;
      padding:20px;
    }

    .result-emoji{font-size:4rem;margin-bottom:5px;}
    .result-score{
      font-size:2.2rem;
      font-weight:900;
      margin:8px 0;
      background:linear-gradient(135deg,#ffd54f,#ff9800);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .result-msg{
      font-size:1.05rem;
      line-height:1.5;
      margin-bottom:8px;
      color:rgba(255,255,255,.8);
    }
    .result-verse{
      font-size:.8rem;
      color:rgba(165,214,167,.8);
      font-style:italic;
      margin-bottom:18px;
      padding:0 15px;
      line-height:1.6;
    }

    #ranking-overlay{
      background:rgba(15,10,8,.95);
      display:none;
      z-index:160;
      padding:18px;
    }
    .ranking-title{
      font-size:1.4rem;
      font-weight:900;
      margin-bottom:12px;
      background:linear-gradient(135deg,#ffd54f,#ff9800);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .ranking-list{
      width:90%;
      max-height:280px;
      overflow-y:auto;
      margin-bottom:12px;
    }
    .ranking-list::-webkit-scrollbar{width:3px;}
    .ranking-list::-webkit-scrollbar-thumb{
      background:rgba(255,255,255,.2);
      border-radius:3px;
    }

    .rank-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:9px 14px;
      margin-bottom:5px;
      border-radius:14px;
      color:white;
      font-weight:700;
      font-size:.95rem;
    }
    .rank-left{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .rank-medal{
      font-size:1.2rem;
      width:28px;
      text-align:center;
    }
    .rank-num{
      font-size:.85rem;
      width:28px;
      text-align:center;
      color:rgba(255,255,255,.5);
    }
    .rank-score-val{font-weight:800;}
    .rank-1{
      background:linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,215,0,.05));
      border:1px solid rgba(255,215,0,.3);
    }
    .rank-1 .rank-score-val{color:#ffd54f;}
    .rank-2{
      background:linear-gradient(135deg,rgba(192,192,192,.2),rgba(192,192,192,.05));
      border:1px solid rgba(192,192,192,.2);
    }
    .rank-2 .rank-score-val{color:#e0e0e0;}
    .rank-3{
      background:linear-gradient(135deg,rgba(205,127,50,.2),rgba(205,127,50,.05));
      border:1px solid rgba(205,127,50,.2);
    }
    .rank-3 .rank-score-val{color:#ffab91;}
    .rank-other{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }
    .rank-other .rank-score-val{color:rgba(255,255,255,.6);}
    .rank-empty{
      color:rgba(255,255,255,.4);
      font-size:.95rem;
      padding:30px 0;
    }
    .ranking-loading{
      color:rgba(255,255,255,.5);
      font-size:.95rem;
      padding:30px 0;
    }
    .loading-spinner{
      display:inline-block;
      width:18px;
      height:18px;
      border:2px solid rgba(255,255,255,.2);
      border-top-color:#ffd54f;
      border-radius:50%;
      animation:spin .6s linear infinite;
      vertical-align:middle;
      margin-right:6px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .my-rank-box{
      width:90%;
      margin:0 0 14px;
      padding:12px 16px;
      border-radius:16px;
      background:linear-gradient(135deg,rgba(255,213,79,.18),rgba(255,152,0,.08));
      border:1px solid rgba(255,213,79,.28);
      color:white;
      font-weight:800;
      line-height:1.55;
      display:none;
    }
    .my-rank-box b{
      color:#ffd54f;
      font-size:1.15rem;
    }
    .my-rank-sub{
      display:block;
      margin-top:2px;
      font-size:.83rem;
      color:rgba(255,255,255,.7);
      font-weight:600;
    }

    #name-modal{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(10,6,4,.97);
      display:none;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:200;
      border-radius:30px;
      padding:20px;
      backdrop-filter:blur(10px);
    }
    .name-label{
      color:white;
      font-size:1.2rem;
      font-weight:800;
      margin-bottom:5px;
    }
    .name-sub{
      color:rgba(255,255,255,.5);
      font-size:.85rem;
      margin-bottom:18px;
    }
    .name-input{
      width:70%;
      padding:14px;
      font-size:1.3rem;
      text-align:center;
      border:2px solid rgba(255,213,79,.4);
      border-radius:15px;
      background:rgba(255,255,255,.06);
      color:white;
      outline:none;
      font-weight:bold;
      transition:border-color .3s;
    }
    .name-input::placeholder{color:rgba(255,255,255,.2);}
    .name-input:focus{border-color:#ffd54f;}

    .name-buttons{
      margin-top:15px;
      display:flex;
      gap:10px;
    }
    .btn-confirm{
      padding:14px 40px;
      font-size:1.1rem;
      background:linear-gradient(135deg,#ffd54f,#ffb300);
      color:#3e2723;
      border:none;
      border-radius:50px;
      cursor:pointer;
      font-weight:800;
      box-shadow:0 4px 15px rgba(255,179,0,.3);
      transition:.2s;
    }
    .btn-confirm:active{transform:scale(.95);}
    .btn-skip{
      padding:14px 22px;
      font-size:1.1rem;
      background:transparent;
      color:rgba(255,255,255,.4);
      border:1px solid rgba(255,255,255,.15);
      border-radius:50px;
      cursor:pointer;
      transition:.2s;
    }
    .btn-skip:hover{color:rgba(255,255,255,.7);}

    .new-record{
      display:inline-block;
      padding:3px 12px;
      border-radius:20px;
      background:linear-gradient(135deg,#ff6f00,#ff8f00);
      color:white;
      font-size:.8rem;
      font-weight:800;
      animation:popIn .4s ease-out;
      margin-bottom:5px;
    }
    @keyframes popIn{
      0%{transform:scale(0)}
      100%{transform:scale(1)}
    }

    .save-status{
      font-size:.8rem;
      margin-top:8px;
      min-height:1.2em;
    }
    .save-ok{color:#a5d6a7;}
    .save-fail{color:#ff8a80;}
  </style>
</head>
<body id="main-body">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="grass-decoration" id="grass-deco"></div>

  <div id="game-container">
    <div id="overlay" class="overlay-base">
      <div class="game-title">
        <div class="church-name">이리신광교회 아동국</div>
        <div class="main-title">잃어버린 양 구조 대작전</div>
      </div>
      <div id="preview-sheep" style="font-size:3.5rem;margin:12px 0;">🐑</div>
      <div class="game-info" id="game-info-text">
        구덩이에 빠진 <span class="info-badge badge-sheep">🐑 양</span> 을 터치해서 구조하세요!<br>
        <span class="info-badge badge-wolf">🐺 늑대</span> 를 터치하면 <b style="color:#ff8a80;">-2마리</b> 감점!<br>
        <span class="info-note">⚠ 양과 늑대가 비슷하니 잘 보고 터치하세요!</span>
      </div>
      <button class="btn-start" id="start-btn" onclick="prepareGame()">구조 시작!</button>
      <button class="btn-secondary" id="rank-btn-start" onclick="showRanking()" style="margin-top:12px;">🏆 랭킹 보기</button>
      <div id="countdown">3</div>
    </div>

    <div id="name-modal">
      <div class="name-label">목자님 이름을 알려주세요!</div>
      <div class="name-sub">랭킹에 등록됩니다</div>
      <input type="text" class="name-input" id="name-input" placeholder="이름" maxlength="10" autocomplete="off">
      <div class="name-buttons">
        <button class="btn-confirm" id="btn-name-submit" onclick="submitName()">등록</button>
        <button class="btn-skip" onclick="skipName()">건너뛰기</button>
      </div>
      <div class="save-status" id="save-status"></div>
    </div>

    <div id="result-overlay" class="overlay-base">
      <div id="new-record-badge" style="display:none;" class="new-record">🎉 NEW RECORD!</div>
      <div class="result-emoji" id="result-emoji">🏆</div>
      <div class="result-score" id="result-score-text"></div>
      <div class="result-msg" id="result-msg"></div>
      <div class="result-verse">
        "너희 중에 어떤 사람이 양 백 마리가 있는데<br>
        그 중의 하나를 잃으면 아흔아홉 마리를<br>
        들에 두고 그 잃은 것을 찾아다니지 아니하겠느냐"<br>
        — 누가복음 15:4
      </div>
      <button class="btn-start" onclick="showRankingFromResult()">🏆 랭킹 보기</button>
      <button class="btn-secondary" onclick="resetGame()">다시 하기</button>
    </div>

    <div id="ranking-overlay" class="overlay-base">
      <div class="ranking-title">🏆 양 구조 랭킹</div>
      <div class="ranking-list" id="ranking-list"></div>
      <div id="my-rank-box" class="my-rank-box"></div>
      <button class="btn-start" onclick="closeRankingAndReset()">다시 하기</button>
      <button class="btn-secondary" onclick="closeRanking()">돌아가기</button>
    </div>

    <div class="stats">
      <div class="stat-item" id="time-area">
        <span class="stat-icon">⏱</span>
        <span class="stat-value" id="time">40</span>
      </div>
      <div class="stat-item">
        <span class="stat-icon">🐑</span>
        <span class="stat-value" id="score">0</span>
        <span style="font-size:.85rem;opacity:.7;">마리</span>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="grid" id="grid">
      <div class="hole"><div class="target"></div></div>
      <div class="hole"><div class="target"></div></div>
      <div class="hole"><div class="target"></div></div>
      <div class="hole"><div class="target"></div></div>
      <div class="hole"><div class="target"></div></div>
      <div class="hole"><div class="target"></div></div>
      <div class="hole"><div class="target"></div></div>
      <div class="hole"><div class="target"></div></div>
      <div class="hole"><div class="target"></div></div>
    </div>
  </div>

  <script>
    const GAS_URL='https://script.google.com/macros/s/AKfycbxf50osa6euSPOmBqTJE4xSxHr56kIKlqiNBNI4M-RAjNmbAp8_OobgV1LUGBwOTdTJSw/exec';
    const GAME_DURATION=40;
    const TOP_RANK_LIMIT=10;

    // ★★★ 여기에는 기존 Base64 값을 그대로 넣어주세요 ★★★
    const SHEEP_B64='기존 SHEEP_B64 값 그대로 붙여넣기';
    const WOLF_B64='기존 WOLF_B64 값 그대로 붙여넣기';

    (function(){
      const d=document.getElementById('grass-deco');
      for(let i=0;i<60;i++){
        const b=document.createElement('div');
        b.className='grass-blade';
        b.style.left=(Math.random()*100)+'%';
        b.style.height=(15+Math.random()*30)+'px';
        b.style.animationDelay=(Math.random()*2)+'s';
        b.style.opacity=.4+Math.random()*.6;
        d.appendChild(b);
      }
    })();

    let score=0;
    let timeLeft=GAME_DURATION;
    let gameActive=false;
    let timerInterval=null;
    let pendingTimeouts=[];
    let lastScore=0;
    let rankingReturnTo='start';
    let currentPhase='normal';
    let phaseIntervals=[];
    let cachedRanking=[];
    const targets=document.querySelectorAll('.target');
    const container=document.getElementById('game-container');
    const grid=document.getElementById('grid');

    // ─── 사운드 ───
    const AudioCtx=window.AudioContext||window.webkitAudioContext;
    let audioCtx=null;
    let sheepBuffer=null;
    let wolfBuffer=null;
    let bgmPlaying=false;
    let bgmMaster=null;
    let bgmTimer=null;

    function ensureAudio(){
      if(!audioCtx) audioCtx=new AudioCtx();
      if(audioCtx.state==='suspended') audioCtx.resume();
    }

    function b64toArrayBuffer(b64){
      const bin=atob(b64);
      const len=bin.length;
      const bytes=new Uint8Array(len);
      for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
      return bytes.buffer;
    }

    async function preloadAllSounds(){
      ensureAudio();
      try{
        if(SHEEP_B64 && SHEEP_B64 !== '기존 SHEEP_B64 값 그대로 붙여넣기'){
          sheepBuffer=await audioCtx.decodeAudioData(b64toArrayBuffer(SHEEP_B64));
        }
        if(WOLF_B64 && WOLF_B64 !== '기존 WOLF_B64 값 그대로 붙여넣기'){
          wolfBuffer=await audioCtx.decodeAudioData(b64toArrayBuffer(WOLF_B64));
        }
      }catch(e){
        console.warn('사운드 디코딩 실패:',e);
      }
    }

    function playBuffer(buffer,volume){
      if(!buffer||!audioCtx) return;
      const source=audioCtx.createBufferSource();
      const gain=audioCtx.createGain();
      source.buffer=buffer;
      gain.gain.value=volume;
      source.connect(gain);
      gain.connect(audioCtx.destination);
      source.start(0);
    }

    function playSheepSound(){playBuffer(sheepBuffer,0.7);}
    function playWolfSound(){playBuffer(wolfBuffer,0.6);}

    function playPhaseWarning(){
      ensureAudio();
      const now=audioCtx.currentTime;
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      o.connect(g);
      g.connect(audioCtx.destination);
      o.type='triangle';
      o.frequency.setValueAtTime(500,now);
      o.frequency.exponentialRampToValueAtTime(700,now+0.2);
      g.gain.setValueAtTime(0.15,now);
      g.gain.exponentialRampToValueAtTime(0.01,now+0.3);
      o.start(now);
      o.stop(now+0.3);
    }

    // ─── BGM ───
    function scheduleBGMBar(barStart,chordIdx){
      if(!bgmPlaying||!audioCtx||!bgmMaster) return;
      const bpm=130;
      const beatSec=60/bpm;

      const bassFreqs=[
        [130.81,130.81,130.81,130.81],
        [98.00,98.00,98.00,98.00],
        [110.00,110.00,110.00,110.00],
        [87.31,87.31,87.31,87.31]
      ];
      const melFreqs=[
        [523,659,784,659],
        [587,784,988,784],
        [523,659,880,659],
        [523,698,880,698]
      ];

      for(let beat=0;beat<4;beat++){
        const t=barStart+beat*beatSec;
        if(t<audioCtx.currentTime) continue;

        if(beat===0||beat===2){
          const o=audioCtx.createOscillator();
          const g=audioCtx.createGain();
          o.connect(g);
          g.connect(bgmMaster);
          o.type='sine';
          o.frequency.setValueAtTime(150,t);
          o.frequency.exponentialRampToValueAtTime(40,t+0.12);
          g.gain.setValueAtTime(1,t);
          g.gain.exponentialRampToValueAtTime(0.01,t+0.2);
          o.start(t);
          o.stop(t+0.2);
        }

        if(beat===1||beat===3){
          const bufLen=audioCtx.sampleRate*0.1;
          const buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
          const d=buf.getChannelData(0);
          for(let i=0;i<bufLen;i++){
            d[i]=(Math.random()*2-1)*Math.exp(-i/(bufLen*0.2));
          }
          const src=audioCtx.createBufferSource();
          const bp=audioCtx.createBiquadFilter();
          const g=audioCtx.createGain();
          src.buffer=buf;
          bp.type='bandpass';
          bp.frequency.value=3000;
          bp.Q.value=1;
          g.gain.value=0.7;
          src.connect(bp);
          bp.connect(g);
          g.connect(bgmMaster);
          src.start(t);

          const o=audioCtx.createOscillator();
          const g2=audioCtx.createGain();
          o.connect(g2);
          g2.connect(bgmMaster);
          o.type='triangle';
          o.frequency.setValueAtTime(180,t);
          o.frequency.exponentialRampToValueAtTime(80,t+0.08);
          g2.gain.setValueAtTime(0.5,t);
          g2.gain.exponentialRampToValueAtTime(0.01,t+0.1);
          o.start(t);
          o.stop(t+0.1);
        }

        for(let h=0;h<2;h++){
          const ht=t+h*beatSec*0.5;
          if(ht<audioCtx.currentTime) continue;
          const bl=audioCtx.sampleRate*0.05;
          const hb=audioCtx.createBuffer(1,bl,audioCtx.sampleRate);
          const hd=hb.getChannelData(0);
          for(let i=0;i<bl;i++){
            hd[i]=(Math.random()*2-1)*Math.exp(-i/(bl*0.15));
          }
          const hs=audioCtx.createBufferSource();
          const hp=audioCtx.createBiquadFilter();
          const hg=audioCtx.createGain();
          hs.buffer=hb;
          hp.type='highpass';
          hp.frequency.value=7000;
          hg.gain.value=h===0?0.3:0.15;
          hs.connect(hp);
          hp.connect(hg);
          hg.connect(bgmMaster);
          hs.start(ht);
        }

        const ob=audioCtx.createOscillator();
        const gb=audioCtx.createGain();
        ob.connect(gb);
        gb.connect(bgmMaster);
        ob.type='square';
        ob.frequency.value=bassFreqs[chordIdx][beat];
        gb.gain.setValueAtTime(0.35,t);
        gb.gain.exponentialRampToValueAtTime(0.01,t+beatSec*0.7);
        ob.start(t);
        ob.stop(t+beatSec*0.8);

        const om=audioCtx.createOscillator();
        const gm=audioCtx.createGain();
        om.connect(gm);
        gm.connect(bgmMaster);
        om.type='sine';
        om.frequency.value=melFreqs[chordIdx][beat];
        gm.gain.setValueAtTime(0.2,t);
        gm.gain.exponentialRampToValueAtTime(0.01,t+beatSec*0.6);
        om.start(t);
        om.stop(t+beatSec*0.7);
      }
    }

    function startBGM(){
      if(bgmPlaying) return;
      ensureAudio();
      bgmPlaying=true;

      bgmMaster=audioCtx.createGain();
      bgmMaster.gain.value=0.12;
      bgmMaster.connect(audioCtx.destination);

      const bpm=130;
      const barSec=(60/bpm)*4;
      let nextBarTime=audioCtx.currentTime+0.1;
      let barIndex=0;

      function scheduleAhead(){
        if(!bgmPlaying) return;
        const lookAhead=audioCtx.currentTime+2;
        while(nextBarTime<lookAhead){
          scheduleBGMBar(nextBarTime, barIndex%4);
          nextBarTime+=barSec;
          barIndex++;
        }
      }

      scheduleAhead();
      bgmTimer=setInterval(scheduleAhead,500);
    }

    function stopBGM(){
      bgmPlaying=false;
      if(bgmTimer){
        clearInterval(bgmTimer);
        bgmTimer=null;
      }
      if(bgmMaster){
        try{
          bgmMaster.gain.setValueAtTime(0,audioCtx.currentTime);
        }catch(e){}
        bgmMaster.disconnect();
        bgmMaster=null;
      }
    }

    // ─── 서버 통신 ───
    async function fetchRanking(){
      try{
        const res=await fetch(GAS_URL,{method:'GET',redirect:'follow'});
        const text=await res.text();
        const data=JSON.parse(text);
        if(data.result==='ok'){
          cachedRanking=(data.ranking||[])
            .map(r=>({name:String(r.name||'이름없음'),score:Number(r.score)||0}))
            .sort((a,b)=>b.score-a.score);
          return cachedRanking;
        }
      }catch(e){
        console.warn('랭킹 로드 실패:',e);
      }
      return cachedRanking;
    }

    async function saveScoreToServer(name,sc){
      try{
        const res=await fetch(GAS_URL,{
          method:'POST',
          redirect:'follow',
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          body:JSON.stringify({name:name,score:sc})
        });
        const text=await res.text();
        const data=JSON.parse(text);
        return data.result==='ok';
      }catch(e){
        console.warn('서버 저장 실패:',e);
        return false;
      }
    }

    // ─── 이펙트 ───
    function showScorePopup(el,text,isPlus){
      const popup=document.createElement('div');
      popup.className='score-popup '+(isPlus?'plus':'minus');
      popup.innerText=text;
      const rect=el.closest('.hole').getBoundingClientRect();
      const cRect=container.getBoundingClientRect();
      popup.style.left=(rect.left-cRect.left+rect.width/2-20)+'px';
      popup.style.top=(rect.top-cRect.top-10)+'px';
      container.appendChild(popup);
      setTimeout(()=>popup.remove(),800);
    }

    function showSparkle(el){
      const rect=el.closest('.hole').getBoundingClientRect();
      const cRect=container.getBoundingClientRect();
      const cx=rect.left-cRect.left+rect.width/2;
      const cy=rect.top-cRect.top+rect.height/2;

      for(let i=0;i<8;i++){
        const dot=document.createElement('div');
        dot.className='sparkle-dot';
        const a=(Math.PI*2/8)*i;
        const d=20+Math.random()*15;
        dot.style.cssText=`left:${cx}px;top:${cy}px;--sx:${Math.cos(a)*d}px;--sy:${Math.sin(a)*d}px;`;
        const w=document.createElement('div');
        w.className='rescue-sparkle';
        w.appendChild(dot);
        container.appendChild(w);
        setTimeout(()=>w.remove(),500);
      }
    }

    // ─── 난이도 ───
    function getPhaseParams(){
      if(currentPhase==='frenzy'){
        return{
          wolfChance:.33,
          showTime:{sheep:650,wolf:520},
          spawnDelay:{min:220,max:400}
        };
      }
      if(currentPhase==='hard'){
        return{
          wolfChance:.27,
          showTime:{sheep:800,wolf:620},
          spawnDelay:{min:350,max:550}
        };
      }
      const elapsed=GAME_DURATION-timeLeft;
      const normalEnd=GAME_DURATION-10;
      const progress=Math.min(elapsed/normalEnd,1);
      return{
        wolfChance:.2+progress*.07,
        showTime:{
          sheep:1100-progress*200,
          wolf:850-progress*140
        },
        spawnDelay:{
          min:350+250*(1-progress),
          max:600+250*(1-progress)
        }
      };
    }

    function showTarget(){
      if(!gameActive) return;

      const available=[...targets].filter(t=>!t.classList.contains('up'));
      if(available.length===0) return;

      const target=available[Math.floor(Math.random()*available.length)];
      const params=getPhaseParams();
      const isWolf=Math.random()<params.wolfChance;

      if(isWolf){
        target.innerHTML='<div class="char-wrap char-wolf">🐺</div>';
        target.dataset.type='wolf';
      }else{
        target.innerHTML='<div class="char-wrap char-sheep">🐑</div>';
        target.dataset.type='sheep';
      }

      target.dataset.hit='0';
      target.classList.add('up');

      const showDuration=isWolf?params.showTime.wolf:params.showTime.sheep;
      const hideTimeout=setTimeout(()=>{
        target.classList.remove('up');
        target.dataset.hit='0';
        if(gameActive){
          const delay=params.spawnDelay.min+Math.random()*(params.spawnDelay.max-params.spawnDelay.min);
          const t2=setTimeout(showTarget,delay);
          pendingTimeouts.push(t2);
        }
      },showDuration);

      pendingTimeouts.push(hideTimeout);
    }

    function enterPhase(phase){
      if(currentPhase===phase) return;
      phaseIntervals.forEach(iv=>clearInterval(iv));
      phaseIntervals=[];
      container.classList.remove('phase-hard','phase-frenzy');
      currentPhase=phase;

      if(phase==='hard'){
        container.classList.add('phase-hard');
        document.getElementById('progress-fill').classList.add('caution');
        playPhaseWarning();
        const iv=setInterval(()=>{
          if(!gameActive){
            clearInterval(iv);
            return;
          }
          showTarget();
        },800);
        phaseIntervals.push(iv);
      }else if(phase==='frenzy'){
        container.classList.remove('phase-hard');
        container.classList.add('phase-frenzy');
        document.getElementById('progress-fill').classList.remove('caution');
        document.getElementById('progress-fill').classList.add('danger');
        playPhaseWarning();
        const iv1=setInterval(()=>{
          if(!gameActive){
            clearInterval(iv1);
            return;
          }
          showTarget();
        },500);
        const iv2=setInterval(()=>{
          if(!gameActive){
            clearInterval(iv2);
            return;
          }
          showTarget();
        },700);
        phaseIntervals.push(iv1,iv2);
      }
    }

    // ─── 판정 개선: click 대신 pointerdown ───
    function hit(el){
      if(!el || !gameActive) return;
      if(!el.classList.contains('up')) return;
      if(el.dataset.hit==='1') return;

      el.dataset.hit='1';

      if(el.dataset.type==='sheep'){
        playSheepSound();
        score++;
        showScorePopup(el,'+1',true);
        showSparkle(el);
        container.classList.add('flash-green');
        setTimeout(()=>container.classList.remove('flash-green'),300);
      }else{
        playWolfSound();
        container.classList.add('flash-red');
        setTimeout(()=>container.classList.remove('flash-red'),300);
        score=Math.max(0,score-2);
        showScorePopup(el,'-2',false);
      }

      document.getElementById('score').innerText=score;
      el.classList.remove('up');
    }

    grid.addEventListener('pointerdown',function(e){
      const target=e.target.closest('.target');
      if(!target) return;
      e.preventDefault();
      hit(target);
    },{passive:false});

    function startGame(){
      score=0;
      timeLeft=GAME_DURATION;
      gameActive=true;
      currentPhase='normal';
      pendingTimeouts=[];
      phaseIntervals=[];

      document.getElementById('score').innerText=score;
      document.getElementById('time').innerText=timeLeft;
      document.getElementById('progress-fill').style.width='100%';
      document.getElementById('progress-fill').classList.remove('caution','danger');
      container.classList.remove('phase-hard','phase-frenzy');

      targets.forEach(t=>{
        t.classList.remove('up');
        t.dataset.hit='0';
      });

      startBGM();

      timerInterval=setInterval(()=>{
        timeLeft--;
        document.getElementById('time').innerText=timeLeft;
        document.getElementById('progress-fill').style.width=(timeLeft/GAME_DURATION*100)+'%';

        const ta=document.getElementById('time-area');
        if(timeLeft<=10) ta.classList.add('time-urgent');
        else ta.classList.remove('time-urgent');

        if(timeLeft<=5&&currentPhase!=='frenzy') enterPhase('frenzy');
        else if(timeLeft<=10&&timeLeft>5&&currentPhase==='normal') enterPhase('hard');

        if(timeLeft<=0){
          clearInterval(timerInterval);
          endGame();
        }
      },1000);

      showTarget();
      const t=setTimeout(showTarget,500);
      pendingTimeouts.push(t);
    }

    function endGame(){
      gameActive=false;
      stopBGM();
      phaseIntervals.forEach(iv=>clearInterval(iv));
      phaseIntervals=[];
      pendingTimeouts.forEach(t=>clearTimeout(t));
      pendingTimeouts=[];

      targets.forEach(t=>{
        t.classList.remove('up');
        t.dataset.hit='0';
      });

      container.classList.remove('phase-hard','phase-frenzy');
      lastScore=score;

      let emoji,msg;
      if(score>=35){
        emoji='🏆';
        msg='놀라운 목자님! 양들이 안전해요!';
      }else if(score>=20){
        emoji='🌟';
        msg='훌륭한 목자님! 양들이 기뻐해요!';
      }else if(score>=10){
        emoji='🐑';
        msg='좋은 시작이에요! 다시 도전해볼까요?';
      }else{
        emoji='💪';
        msg='양들이 기다리고 있어요! 한 번 더!';
      }

      document.getElementById('result-emoji').innerText=emoji;
      document.getElementById('result-score-text').innerText=score+'마리 구조 성공!';
      document.getElementById('result-msg').innerText=msg;

      const isNewRecord=cachedRanking.length===0 || score>cachedRanking[0].score;
      document.getElementById('new-record-badge').style.display=isNewRecord?'inline-block':'none';
      document.getElementById('name-input').value='';
      document.getElementById('name-input').style.borderColor='rgba(255,213,79,.4)';
      document.getElementById('save-status').innerHTML='';
      document.getElementById('btn-name-submit').disabled=false;
      document.getElementById('btn-name-submit').innerText='등록';
      document.getElementById('name-modal').style.display='flex';
    }

    function prepareGame(){
      ensureAudio();
      if(!sheepBuffer || !wolfBuffer) preloadAllSounds();

      timeLeft=GAME_DURATION;
      document.getElementById('time').innerText=timeLeft;
      document.getElementById('progress-fill').style.width='100%';
      document.getElementById('progress-fill').classList.remove('caution','danger');

      document.getElementById('start-btn').style.display='none';
      document.getElementById('game-info-text').style.display='none';
      document.getElementById('rank-btn-start').style.display='none';
      document.querySelector('#overlay .game-title').style.display='none';
      document.getElementById('preview-sheep').style.display='none';

      const countDiv=document.getElementById('countdown');
      countDiv.style.display='block';
      let count=3;
      countDiv.innerText=count;

      const cd=setInterval(()=>{
        count--;
        if(count>0){
          countDiv.innerText=count;
        }else if(count===0){
          countDiv.innerText='구조!!';
        }else{
          clearInterval(cd);
          document.getElementById('overlay').style.display='none';
          startGame();
        }
      },1000);
    }

    async function submitName(){
      const name=document.getElementById('name-input').value.trim();
      if(!name){
        document.getElementById('name-input').style.borderColor='#ff5252';
        document.getElementById('name-input').placeholder='이름을 입력해주세요!';
        return;
      }

      const btn=document.getElementById('btn-name-submit');
      const status=document.getElementById('save-status');

      btn.disabled=true;
      btn.innerText='저장 중...';
      status.innerHTML='<span class="loading-spinner"></span> 서버에 기록 저장 중...';
      status.className='save-status';

      const ok=await saveScoreToServer(name,lastScore);

      if(ok){
        status.innerHTML='✅ 저장 완료!';
        status.className='save-status save-ok';
      }else{
        status.innerHTML='⚠ 서버 저장 실패 (로컬에만 저장됨)';
        status.className='save-status save-fail';
      }

      saveToLocal(name,lastScore);

      try{
        await fetchRanking();
      }catch(e){}

      setTimeout(()=>{
        btn.innerText='등록';
        btn.disabled=false;
        document.getElementById('name-modal').style.display='none';
        document.getElementById('result-overlay').style.display='flex';
      },800);
    }

    function skipName(){
      document.getElementById('name-modal').style.display='none';
      document.getElementById('result-overlay').style.display='flex';
    }

    document.getElementById('name-input').addEventListener('keydown',function(e){
      if(e.key==='Enter') submitName();
    });

    function getLocalRanking(){
      try{
        return JSON.parse(localStorage.getItem('sheepRanking')||'[]')
          .map(r=>({name:String(r.name||'이름없음'),score:Number(r.score)||0}))
          .sort((a,b)=>b.score-a.score);
      }catch{
        return [];
      }
    }

    function saveToLocal(name,sc){
      const ranking=getLocalRanking();
      ranking.push({name:name,score:sc});
      ranking.sort((a,b)=>b.score-a.score);
      if(ranking.length>50) ranking.length=50;
      localStorage.setItem('sheepRanking',JSON.stringify(ranking));
    }

    function escapeHtml(s){
      const d=document.createElement('div');
      d.textContent=s;
      return d.innerHTML;
    }

    function getRankByScore(ranking,sc){
      return ranking.filter(r=>Number(r.score)>Number(sc)).length+1;
    }

    function renderRankingData(ranking){
      const list=document.getElementById('ranking-list');
      const myRankBox=document.getElementById('my-rank-box');

      if(!ranking || ranking.length===0){
        list.innerHTML='<div class="rank-empty">아직 기록이 없어요!<br>첫 번째 목자님이 되어보세요</div>';
        myRankBox.style.display='none';
        return;
      }

      const topRanking=ranking.slice(0,TOP_RANK_LIMIT);
      let html='';

      topRanking.forEach((r,i)=>{
        const rank=i+1;
        let medal,cls;

        if(rank===1){
          medal='🥇';
          cls='rank-1';
        }else if(rank===2){
          medal='🥈';
          cls='rank-2';
        }else if(rank===3){
          medal='🥉';
          cls='rank-3';
        }else{
          medal='';
          cls='rank-other';
        }

        html += `
          <div class="rank-item ${cls}">
            <div class="rank-left">
              ${medal ? `<span class="rank-medal">${medal}</span>` : `<span class="rank-num">${rank}</span>`}
              <span>${escapeHtml(String(r.name))}</span>
            </div>
            <span class="rank-score-val">${r.score}마리</span>
          </div>
        `;
      });

      list.innerHTML=html;

      if(lastScore>0){
        const myRank=getRankByScore(ranking,lastScore);
        myRankBox.innerHTML=`
          🙋 이번 점수 기준 <b>${myRank}등</b>
          <span class="my-rank-sub">공개 랭킹은 10위까지만 표시됩니다</span>
        `;
        myRankBox.style.display='block';
      }else{
        myRankBox.style.display='none';
      }
    }

    async function loadAndRenderRanking(){
      document.getElementById('ranking-list').innerHTML='<div class="ranking-loading"><span class="loading-spinner"></span> 랭킹 불러오는 중...</div>';
      document.getElementById('my-rank-box').style.display='none';

      const ranking=await fetchRanking();
      if(ranking.length>0){
        renderRankingData(ranking);
      }else{
        renderRankingData(getLocalRanking());
      }
    }

    function showRanking(){
      rankingReturnTo='start';
      document.getElementById('overlay').style.display='none';
      document.getElementById('ranking-overlay').style.display='flex';
      loadAndRenderRanking();
    }

    function showRankingFromResult(){
      rankingReturnTo='result';
      document.getElementById('result-overlay').style.display='none';
      document.getElementById('ranking-overlay').style.display='flex';
      loadAndRenderRanking();
    }

    function closeRanking(){
      document.getElementById('ranking-overlay').style.display='none';
      if(rankingReturnTo==='result'){
        document.getElementById('result-overlay').style.display='flex';
      }else{
        resetToStart();
      }
    }

    function closeRankingAndReset(){
      document.getElementById('ranking-overlay').style.display='none';
      resetToStart();
    }

    function resetGame(){
      document.getElementById('result-overlay').style.display='none';
      resetToStart();
    }

    function resetToStart(){
      document.getElementById('overlay').style.display='flex';
      document.getElementById('start-btn').style.display='';
      document.getElementById('game-info-text').style.display='';
      document.getElementById('rank-btn-start').style.display='';
      document.querySelector('#overlay .game-title').style.display='';
      document.getElementById('preview-sheep').style.display='';
      document.getElementById('countdown').style.display='none';
      document.getElementById('time-area').classList.remove('time-urgent');

      container.classList.remove('phase-hard','phase-frenzy');
      document.getElementById('progress-fill').classList.remove('caution','danger');

      score=0;
      document.getElementById('score').innerText=0;
      document.getElementById('time').innerText=GAME_DURATION;
      document.getElementById('progress-fill').style.width='100%';
      document.getElementById('my-rank-box').style.display='none';
    }

    fetchRanking();
  </script>
</body>
</html>
